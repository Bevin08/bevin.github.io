<!DOCTYPE html>
<html>
<head>
<title>Matrix Terminal</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
color:#00ff00;
font-family:monospace;
}

#terminal{
position:absolute;
top:20px;
left:20px;
z-index:2;
}

input{
background:black;
border:none;
color:#00ff00;
font-family:monospace;
outline:none;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:1;
}
</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div id="terminal">
<h3>Matrix System</h3>
<p>Type <b>help</b></p>
<div id="output"></div>
<span>> </span>
<input id="cmd" autofocus>
</div>

<script>

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "アカサタナハマヤラワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const matrix = letters.split("");

const fontSize = 16;
const columns = canvas.width/fontSize;

const drops = [];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0F0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text = matrix[Math.floor(Math.random()*matrix.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,35);


// terminal commands

let input=document.getElementById("cmd");
let output=document.getElementById("output");

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=input.value;

output.innerHTML += "<p>> "+cmd+"</p>";

if(cmd==="help"){
output.innerHTML += "<p>Commands: about, secret, clear</p>";
}

else if(cmd==="about"){
output.innerHTML += "<p>Welcome to my Matrix website 😎</p>";
}

else if(cmd==="secret"){
output.innerHTML += "<p>ACCESS GRANTED 🟢</p>";
}

else if(cmd==="clear"){
output.innerHTML="";
}

input.value="";

}

});

</script>

</body>
</html>
